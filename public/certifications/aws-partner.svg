<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rectangle background -->
  <rect x="20" y="20" width="160" height="160" rx="10" fill="#FF9900" stroke="#232F3E" stroke-width="2"/>
  <!-- Inner white section -->
  <rect x="30" y="30" width="140" height="140" rx="8" fill="white"/>
  <!-- AWS text -->
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#232F3E">AWS</text>
  <!-- Partner Network text -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#232F3E">PARTNER</text>
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#232F3E">NETWORK</text>
  <!-- Checkmark -->
  <path d="M 70 130 L 85 145 L 130 100" stroke="#FF9900" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
